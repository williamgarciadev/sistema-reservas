name: CD - Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # Validate deployment
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment confirmation
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]]; then
              echo "❌ Deployment confirmation failed. Type 'DEPLOY' to confirm."
              exit 1
            fi
            echo "✅ Deployment confirmed"
          fi

  # Build and push backend image
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=prod-
            type=raw,value=prod-latest
            type=raw,value=${{ github.ref_name }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build and push frontend image
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: [build-backend]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=prod-
            type=raw,value=prod-latest
            type=raw,value=${{ github.ref_name }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PRODUCTION_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Production VPS
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment:
      name: production
      url: https://${{ secrets.PRODUCTION_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Backup database before deployment
            docker exec postgres pg_dump -U ${{ secrets.PROD_DB_USER }} ${{ secrets.PROD_DB_NAME }} > ~/backups/backup-$(date +%Y%m%d-%H%M%S).sql
            echo "✅ Database backup created"

      - name: Deploy to Production VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Create production directory
            mkdir -p ~/sistema-reservas-prod
            cd ~/sistema-reservas-prod

            # Create/update docker-compose.prod.yml
            cat > docker-compose.prod.yml << 'EOF'
            version: '3.8'
            services:
              postgres:
                image: postgres:15-alpine
                container_name: prod-db
                environment:
                  POSTGRES_USER: ${POSTGRES_USER}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                  POSTGRES_DB: ${POSTGRES_DB}
                volumes:
                  - prod_postgres_data:/var/lib/postgresql/data
                networks:
                  - prod-network
                restart: unless-stopped
              
              redis:
                image: redis:7-alpine
                container_name: prod-redis
                command: redis-server --appendonly yes
                volumes:
                  - prod_redis_data:/data
                networks:
                  - prod-network
                restart: unless-stopped
              
              backend:
                image: ghcr.io/${{ github.repository }}/backend:prod-latest
                container_name: prod-backend
                environment:
                  NODE_ENV: production
                  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
                  REDIS_URL: redis://redis:6379
                  JWT_SECRET: ${JWT_SECRET}
                  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
                  RESEND_API_KEY: ${RESEND_API_KEY}
                  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
                depends_on:
                  - postgres
                  - redis
                networks:
                  - prod-network
                restart: unless-stopped
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.prod-backend.rule=Host(`${API_DOMAIN}`)"
                  - "traefik.http.routers.prod-backend.entrypoints=websecure"
                  - "traefik.http.routers.prod-backend.tls.certresolver=myresolver"
              
              frontend:
                image: ghcr.io/${{ github.repository }}/frontend:prod-latest
                container_name: prod-frontend
                environment:
                  NEXT_PUBLIC_API_URL: https://${API_DOMAIN}/api
                depends_on:
                  - backend
                networks:
                  - prod-network
                restart: unless-stopped
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.prod-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
                  - "traefik.http.routers.prod-frontend.entrypoints=websecure"
                  - "traefik.http.routers.prod-frontend.tls.certresolver=myresolver"

            volumes:
              prod_postgres_data:
              prod_redis_data:

            networks:
              prod-network:
                driver: bridge
            EOF

            # Create .env file
            cat > .env << 'ENVEOF'
            POSTGRES_USER=${{ secrets.PROD_DB_USER }}
            POSTGRES_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            POSTGRES_DB=${{ secrets.PROD_DB_NAME }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.PROD_JWT_REFRESH_SECRET }}
            RESEND_API_KEY=${{ secrets.PROD_RESEND_API_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.PROD_STRIPE_KEY }}
            API_DOMAIN=${{ secrets.PRODUCTION_API_DOMAIN }}
            FRONTEND_DOMAIN=${{ secrets.PRODUCTION_DOMAIN }}
            ENVEOF

            # Pull latest images
            docker pull ghcr.io/${{ github.repository }}/backend:prod-latest
            docker pull ghcr.io/${{ github.repository }}/frontend:prod-latest

            # Run database migrations
            docker run --rm --env-file .env --network prod-network \
              ghcr.io/${{ github.repository }}/backend:prod-latest \
              npx prisma migrate deploy

            # Deploy with zero-downtime (blue-green style)
            docker-compose -f docker-compose.prod.yml up -d --no-deps backend
            docker-compose -f docker-compose.prod.yml up -d --no-deps frontend

            # Wait for health checks
            sleep 10

            # Health check
            curl -f http://localhost:3001/health || exit 1

            # Cleanup old images
            docker image prune -f --filter "until=24h"

            echo "✅ Production deployment completed successfully"

  # Post-deployment verification
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Health check
        run: |
          curl -f https://${{ secrets.PRODUCTION_DOMAIN }}/health || exit 1
          echo "✅ Frontend health check passed"

      - name: API health check
        run: |
          curl -f https://${{ secrets.PRODUCTION_API_DOMAIN }}/api/health || exit 1
          echo "✅ Backend health check passed"
